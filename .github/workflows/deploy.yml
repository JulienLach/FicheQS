name: Deploy

on:
    repository_dispatch:
        types: [deploy-release]
    workflow_dispatch:
        inputs:
            tag:
                description: "Tag to deploy"
                required: true
                default: "latest"

jobs:
    deploy:
        runs-on: ubuntu-latest
        timeout-minutes: 15

        steps:
            - name: "[Git] Checkout code"
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.client_payload.tag || github.event.inputs.tag }}

            - name: "[SSH] Setup key"
              run: |
                  echo "${{ secrets.SSH_PRIVATE_KEY }}" > ssh_key
                  chmod 600 ssh_key

            - name: "[Sync] Transfer files to server"
              run: |
                  rsync -avz --delete \
                    -e "ssh -i ssh_key -p ${{ secrets.VPS_SSH_PORT }} -o StrictHostKeyChecking=no" \
                    --exclude='.git' \
                    --exclude='node_modules' \
                    --exclude='.env' \
                    ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }}:/opt/auditqs/

            - name: "[Docker] Build and restart containers"
              run: |
                  ssh -i ssh_key -p ${{ secrets.VPS_SSH_PORT }} -o StrictHostKeyChecking=no \
                    ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }} << 'EOF'
                    cd /opt/auditqs

                    cat > .env << ENVEOF
                  NODE_ENV=${{ secrets.NODE_ENV }}
                  DB_USER=${{ secrets.DB_USER }}
                  DB_PASSWORD=${{ secrets.DB_PASSWORD }}
                  EMAIL=${{ secrets.EMAIL }}
                  MAILJET_API_KEY=${{ secrets.MAILJET_API_KEY }}
                  MAILJET_SECRET_KEY=${{ secrets.MAILJET_SECRET_KEY }}
                  JWT_SECRET=${{ secrets.JWT_SECRET }}
                  ORIGIN_URL=${{ secrets.ORIGIN_URL }}
                  SERVER_URL=${{ secrets.SERVER_URL }}
                  ENVEOF

                    docker compose up --build -d
                  EOF
