name: CI

on:
    push:
        branches:
            - develop
    pull_request:
        branches:
            - develop
    workflow_call:

jobs:
    backend-ci:
        name: Backend CI
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: Set up Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: "24.x"
                  cache: "npm"
                  cache-dependency-path: backend/package-lock.json

            - name: Install dependencies
              run: npm ci
              working-directory: ./backend

            - name: Type Check & Build
              run: npm run build
              working-directory: ./backend

            - name: Run Tests
              run: npm test -- --run
              working-directory: ./backend

            - name: Run Coverage
              run: npx vitest run --coverage
              working-directory: ./backend

    frontend-ci:
        name: Frontend CI
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: Set up Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: "24.x"
                  cache: "npm"
                  cache-dependency-path: frontend/package-lock.json

            - name: Install dependencies
              run: npm ci
              working-directory: ./frontend

            - name: Build Frontend
              run: npm run build
              working-directory: ./frontend

            - name: Lint
              run: npm run lint
              working-directory: ./frontend
