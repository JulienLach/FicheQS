services:
    db:
        image: postgres:14-alpine
        container_name: audit-db
        environment:
            - POSTGRES_USER=${DB_USER}
            - POSTGRES_PASSWORD=${DB_PASSWORD}
            - POSTGRES_DB=${DB_NAME}
        volumes:
            - audit_pgdata:/var/lib/postgresql/data
            - ./init-databases.sql:/docker-entrypoint-initdb.d/01-init-databases.sql
            - ./database_script.sql:/docker-entrypoint-initdb.d/02-database_script.sql
        networks:
            - audit-network
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
            interval: 10s
            timeout: 5s
            retries: 5
        restart: unless-stopped

    backend:
        build:
            context: ./backend
            dockerfile: dockerfile.backend
        container_name: audit-backend
        ports:
            - "127.0.0.1:3002:3001"
        environment:
            - NODE_ENV=${NODE_ENV}
            - DB_USER=${DB_USER}
            - DB_HOST=db
            - DB_NAME=${DB_NAME}
            - DB_PASSWORD=${DB_PASSWORD}
            - DB_PORT=5432
            - JWT_SECRET=${JWT_SECRET}
            - PORT_BACKEND=3001
            - ORIGIN_URL=${ORIGIN_URL}
            - SERVER_URL=${SERVER_URL}
            - EMAIL=${EMAIL}
            - MAILJET_API_KEY=${MAILJET_API_KEY}
            - MAILJET_SECRET_KEY=${MAILJET_SECRET_KEY}
        depends_on:
            db:
                condition: service_healthy
        networks:
            - audit-network
        restart: unless-stopped

    frontend:
        build:
            context: ./frontend
            dockerfile: dockerfile.frontend
        container_name: audit-frontend
        ports:
            - "127.0.0.1:8081:80"
        environment:
            - NODE_ENV=${NODE_ENV}
        depends_on:
            - backend
        networks:
            - audit-network
        restart: unless-stopped

volumes:
    audit_pgdata:

networks:
    audit-network:
        driver: bridge
